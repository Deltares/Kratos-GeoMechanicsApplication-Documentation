site_name: Kratos Geo Mechanics Application Documentation
theme:
  name: material
  favicon: img\favicon.ico
  logo: img\favicon.ico
  icon:
    annotation: material/arrow-right-circle-outline
  features:
    - content.code.annotate
    - content.code.copy
nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Theory: theory.md
  - User Documentation: user_documentation.md
  - Examples and Tutorials: examples_and_tutorials.md
  - Validation and Verification: validation_and_verification.md
  - Developer Documentation: developer_documentation.md
  - About: about.md
repo_url: https://github.com/Deltares/Kratos-GeoMechanicsApplication-Documentation/
repo_name: Deltares/Kratos-GeoMechanicsApplication-Documentation/
extra:
  authoremail: kratos@deltares.nl
  annotate:
    json: [.s2]
markdown_extensions:
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - macros:
      include_yaml:
        - docs/input_parameters/shared_parameters.yml

copyright: Copyright &copy; 2026 Deltares