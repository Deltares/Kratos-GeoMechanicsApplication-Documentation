# material parameters
geo_drainage_type: 'Indicates the drainage conditions. Type: string. Supported types include `"FULLY_COUPLED"` and `"CONSTANT_PW_FIELD"`.'
youngs_modulus: 'Young''s modulus of the soil skeleton [Pa]. Type: float. Range: (0.0, ->).'
poissons_ratio: 'Poisson''s ratio of the soil skeleton [-]. Type: float. Range: (-1.0, 0.5).'
porosity: 'Fraction of the unit volume that represents the pores. Type: float. Range: [0.0, 1.0].'
density_solid: 'Density of the grain material without the pores [kg/m^3]. Type: float. Range: (0.0, ->).'
density_water: 'Density of the water [kg/m^3]. Type: float. Range: (0.0, ->).'
bulk_modulus_solid: 'Compression modulus of the grain material without pores [N/m^2]. Type: float. Range: (0.0, ->).'
bulk_modulus_fluid: 'Compression modulus of water [N/m^2]. Type: float. Range: (0.0, ->).'
permeability_xx: 'Intrinsic permeability in the XX direction [m^2]. Type: float. Range: (0.0, ->).'
permeability_yy: 'Intrinsic permeability in the YY direction [m^2]. Type: float. Range: (0.0, ->).'
permeability_xy: 'Intrinsic cross permeability in the XY direction [m^2]. Type: float. Range: [0.0, ->).'
permeability_zz: 'Intrinsic permeability in the ZZ direction [m^2]. Relevant for three-dimensional models only. Type: float. Range: (0.0, ->).'
permeability_yz: 'Intrinsic cross permeability in the YZ direction [m^2]. Relevant for three-dimensional models only. Type: float. Range: [0.0, ->).'
permeability_zx: 'Intrinsic cross permeability in the ZX direction [m^2]. Relevant for three-dimensional models only. Type: float. Range: [0.0, ->).'
dynamic_viscosity: 'Dynamic viscosity [Pa s]. Type: float. Range: (0.0, ->).'
permeability_change_inverse_factor: 'If greater than 0.0, the permeability will be updated depending on the volumetric strain. Type: float.'
retention_law: Water retention law `SaturatedLaw`, `VanGenuchtenLaw`, `SaturatedBelowPheraticLevelLaw`
saturated_saturation: 'Maximum water content in the pores. Type: float. Range: [0.0, 1.0].'
saturated_saturation_with_minimum_value: 'Maximum water content in the pores. Type: float. Range: [RESIDUAL_SATURATION, 1.0].'
residual_saturation: 'Minimum water content in the pores. Type: float. Range: [0.0, SATURATED_SATURATION].'
minimum_relative_permeability: 'Minimum relative permeability. Type: float. Range: [0.0, 1.0].'
k0_main_direction: 'Direction of gravity. Type: integer. Allowed values: 0, 1, 2 which correspond to X, Y and Z, respectively.'
k0_value_xx: '$K_0$ coefficient in X direction. Type: float. Range: [0.0, ->).'
k0_value_yy: '$K_0$ coefficient in Y direction. Type: float. Range: [0.0, ->).'
k0_value_zz: '$K_0$ coefficient in Z direction. Type: float. Range: [0.0, ->).'
geo_cohesion: 'Cohesion [Pa]. Type: float. Range: [0.0, ->).'
geo_friction_angle: 'Friction angle **in degrees**. Type: float. Range: [0.0, 90.0).'
geo_dilatancy_angle: 'Dilatancy angle **in degrees**. Type: float. Range: [0.0, GEO_FRICTION_ANGLE].'
geo_tensile_strength: 'Tension cut-off stress [Pa]. Type: float. Range: [0.0, GEO_COHESION / tan(GEO_FRICTION_ANGLE)]'
biot_coefficient: Biot alpha coefficient
# project parameters
echo_level: "Level of logging. Type: integer."
overarching_model_part_name: "Name of the overarching model part. Type: string."
model_part_name: "Name of the model part. Type: string. </br> Note: this can also be an overarching model part, or a list of model parts. In the case of a list use `model_part_name_list`."
variable_name: "Name of the Kratos variable. Type: string."
active: "Defines whether the process is active in the component (X, Y, Z). Type: array of booleans (size 3)."
is_fixed: "Defines whether the value is fixed in the component (X, Y, Z). If `false` the value is only applied to the first step. Type: array of booleans (size 3)."
value: "Prescribed values for each component (X, Y, Z). Type: array of floats (size 3)."
table: "Table ID for time-dependent values for each component (X, Y, Z). When a component of this array points to a table, it overrides the corresponding value in `value`. The actual table is defined in the .mdpa file. Here we refer to the table ID in the .mdpa file. </br> Type: array of integers (size 3). </br> Note: 0 when no table is given."
